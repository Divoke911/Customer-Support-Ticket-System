spring.application.name=demo

server.port=8080

# spring.datasource.url=jdbc:mysql://localhost:3306/support_tickets?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=CONVERT_TO_NULL
spring.datasource.url=jdbc:mysql://localhost:3306/support_tickets?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=CONVERT_TO_NULL&sessionVariables=sql_mode='NO_ENGINE_SUBSTITUTION'

spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

logging.level.com.example.demo=DEBUG
logging.level.org.hibernate.SQL=DEBUG

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
